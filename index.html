<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#100b16">
    <link rel="manifest" href="./manifest.json">
    <title>Calculadora Pro</title>
    <style>
        :root {
            --bg-app: #100b16;
            --bg-calc: #1a1423;
            --btn-num: #261d35;
            --btn-num-hover: #332747;
            --btn-op: rgba(163, 125, 240, 0.15);
            --btn-op-hover: rgba(163, 125, 240, 0.25);
            --color-primary: #a37df0;
            --color-primary-hover: #8e68d9;
            --color-secondary: #f4d068;
            --text-main: #ffffff;
            --text-muted: #9e93b3;
            --bg-dropdown: #261d35;
            --bg-modal: rgba(0, 0, 0, 0.7);
        }

        body.light-theme {
            --bg-app: #f4f4f9;
            --bg-calc: #ffffff;
            --btn-num: #f0edf5;
            --btn-num-hover: #e3dcf0;
            --btn-op: rgba(163, 125, 240, 0.15);
            --btn-op-hover: rgba(163, 125, 240, 0.25);
            --color-primary: #8e5cf5;
            --color-primary-hover: #7645e0;
            --color-secondary: #d99e00;
            --text-main: #2c2833;
            --text-muted: #7b7485;
            --bg-dropdown: #ffffff;
            --bg-modal: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            display: flex;
            justify-content: center;
            align-items: stretch; /* Se estira para llenar la pantalla en móvil */
            min-height: 100vh;
            min-height: 100dvh; /* Soporte para pantallas de celulares modernos */
            color: var(--text-main);
            transition: background-color 0.3s;
        }

        .calculadora {
            background-color: var(--bg-calc);
            width: 100%;
            max-width: 480px;
            padding: 24px 20px 32px 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background-color 0.3s;
        }

        /* En pantallas más grandes (PC/Tablet), vuelve a ser una tarjeta flotante */
        @media (min-width: 481px) {
            body { align-items: center; }
            .calculadora {
                height: auto;
                border-radius: 32px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                margin: 20px;
            }
        }

        /* Barra Superior */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            position: relative;
            width: 100%;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 10px; /* Área de toque más grande */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s, color 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .icon-btn:hover, .icon-btn:active {
            background: var(--btn-num);
            color: var(--text-main);
        }

        .btn-func-toggle {
            background: var(--btn-num);
            color: var(--text-main);
            border: none;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: 20px;
            transition: background 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-func-toggle:hover, .btn-func-toggle:active {
            background-color: var(--btn-num-hover);
        }

        /* Menú Desplegable */
        .dropdown {
            position: absolute;
            top: 55px;
            right: 0;
            background-color: var(--bg-dropdown);
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            width: 220px;
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        body.light-theme .dropdown {
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }

        .dropdown.show { display: flex; }

        .dropdown button {
            background: transparent;
            color: var(--text-main);
            border: none;
            padding: 16px 20px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 0;
            height: auto;
            border-bottom: 1px solid rgba(128,128,128,0.1);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .dropdown button:last-child { border-bottom: none; }
        .dropdown button:hover, .dropdown button:active { background-color: var(--btn-num-hover); }

        /* Pantalla (Crece para ocupar el espacio disponible) */
        .pantalla {
            background-color: transparent;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 10px 5px 20px 5px;
            gap: 8px;
        }

        .operacion-actual {
            color: var(--text-main);
            font-size: 4rem;
            font-weight: 400;
            word-wrap: break-word;
            word-break: break-all;
            text-align: right;
            width: 100%;
            line-height: 1.1;
            letter-spacing: -1px;
            transition: font-size 0.2s;
        }

        .operacion-actual.font-small { font-size: 3rem; }
        .operacion-actual.font-medium { font-size: 4rem; }
        .operacion-actual.font-large { font-size: 5rem; }

        .calculo-parcial {
            color: var(--text-muted);
            font-size: 1.8rem;
            min-height: 36px;
            text-align: right;
            width: 100%;
        }

        /* Teclados */
        .teclados-contenedor {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto; /* Empuja el teclado hacia abajo */
        }

        .teclado {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .teclado-cientifico {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
        }

        .teclado-cientifico.abierto {
            max-height: 300px;
            opacity: 1;
        }

        .teclado button {
            cursor: pointer;
            border: none;
            outline: none;
            background-color: var(--btn-num);
            color: var(--text-main);
            font-size: 1.8rem; /* Letras un poco más grandes */
            height: 75px; /* Botones más altos para celular */
            border-radius: 38px;
            transition: background-color 0.1s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            
            /* Optimización Táctil Crítica */
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent; 
        }

        .teclado button:active { transform: scale(0.90); }
        .teclado button:hover { background-color: var(--btn-num-hover); }

        .btn-op {
            background-color: var(--btn-op) !important;
            color: var(--color-primary) !important;
            font-weight: bold;
        }
        .btn-op:hover, .btn-op:active { background-color: var(--btn-op-hover) !important; }

        .btn-ac { color: var(--color-primary) !important; font-weight: bold; }
        .btn-del { color: var(--color-secondary) !important; }

        .btn-eq {
            background-color: var(--color-primary) !important;
            color: #fff !important;
        }
        .btn-eq:hover, .btn-eq:active { background-color: var(--color-primary-hover) !important; }

        sup { font-size: 0.7em; }

        /* Modales */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-modal);
            display: none;
            justify-content: center;
            align-items: flex-end; /* Aparecen desde abajo en celular */
            z-index: 1000;
        }

        @media (min-width: 481px) {
            .modal-overlay { align-items: center; padding: 20px; }
            .modal-content { border-radius: 24px !important; }
        }

        .modal-overlay.show { display: flex; }

        .modal-content {
            background-color: var(--bg-calc);
            width: 100%;
            max-width: 480px;
            border-radius: 24px 24px 0 0; /* Bordes redondos solo arriba */
            padding: 24px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        }

        body.light-theme .modal-content { box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: var(--text-main);
            font-size: 1.2rem;
            font-weight: bold;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .historial-lista {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .historial-item {
            text-align: right;
            border-bottom: 1px solid rgba(128,128,128,0.1);
            padding-bottom: 12px;
        }

        .hist-expr { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 4px; }
        .hist-res { color: var(--color-primary); font-size: 2rem; font-weight: bold; }

        /* Tarjeta de Contacto */
        .tarjeta-contacto {
            background-color: #1e1929;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        body.light-theme .tarjeta-contacto {
            background-color: #f7f5fa;
            border: 1px solid #eee;
        }

        .avatar-box {
            background-color: #8c52ff;
            width: 64px; height: 64px;
            border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem; margin-bottom: 12px;
        }

        .contacto-nombre { color: var(--text-main); font-size: 1.5rem; font-weight: bold; }
        .contacto-rol { color: #b58cff; font-size: 1.1rem; font-weight: 500; }
        .contacto-email {
            color: var(--text-muted);
            font-size: 1rem;
            display: flex; align-items: center; gap: 8px; margin-top: 8px;
        }
    </style>
</head>
